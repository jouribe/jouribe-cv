<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <style>
      .bg { fill: #eff1f5; }
      .text { fill: #1e1e2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 900; font-size: 58px; letter-spacing: -3px; }
      .accent { fill: #1e66f5; } /* Catppuccin Blue for light */
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1e1e2e; }
        .text { fill: #cdd6f4; }
        .accent { fill: #89b4fa; } /* Catppuccin Blue for dark */
      }
    </style>
  </defs>
  <rect x="10" y="10" width="100" height="100" rx="28" class="bg" />
  <circle cx="88" cy="32" r="8" class="accent" />
  <text x="56" y="80" text-anchor="middle" class="text">JU</text>
</svg>
